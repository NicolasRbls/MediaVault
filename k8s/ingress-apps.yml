apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediavault-apps-ingress
spec:
  rules:
    - http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: mediavault-backoffice-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mediavault-frontend-service
                port:
                  number: 80
