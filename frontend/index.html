<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaVault</title>
    <script>
      // Prevents Flash of Unstyled Content (FOUC) when using a theme switcher
      (function() {
        const theme = localStorage.getItem('color-theme');
        if (theme) {
          document.documentElement.setAttribute('data-theme', theme);
        } else {
          // Fallback to system preference if no theme is stored
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'mediavault_dark');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
