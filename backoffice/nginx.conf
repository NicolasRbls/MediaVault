server {
    listen 80;

    # Block for /admin/ (with slash)
    location /admin/ {
        # This directive maps the URL location to a filesystem location.
        # /admin/ -> /usr/share/nginx/html/
        alias /usr/share/nginx/html/;

        # Add a debug header
        add_header X-Nginx-Location 'DEBUG: admin-alias' always;

        # First, try to serve the requested file, then a directory, 
        # and finally fall back to index.html for SPA routing.
        try_files $uri $uri/ /index.html;
    }

    # Catch-all block for any other requests
    location / {
        add_header X-Nginx-Location 'DEBUG: catch-all-404' always;
        return 404; # Not Found
    }
}
